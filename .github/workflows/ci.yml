name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install lint tools
        run: pip install ruff mypy pydantic fastapi
      - name: Ruff check (services/api)
        run: ruff check services/api
      - name: Ruff check (services/ai_gateway)
        run: ruff check services/ai_gateway
      - name: Ruff format check
        run: ruff format --check services/api services/ai_gateway
      - name: Mypy (services/api)
        working-directory: services/api
        run: mypy app
      - name: Mypy (services/ai_gateway)
        working-directory: services/ai_gateway
        run: mypy app

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install API deps
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run API tests
        working-directory: services/api
        run: pytest tests -q

  ai-gateway-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install AI gateway deps
        working-directory: services/ai_gateway
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run AI gateway tests
        working-directory: services/ai_gateway
        run: pytest tests -q

  web-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web deps
        working-directory: apps/web
        run: npm ci
      - name: ESLint
        working-directory: apps/web
        run: npx eslint .
      - name: TypeScript strict check
        working-directory: apps/web
        run: npx tsc --noEmit

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web deps
        working-directory: apps/web
        run: npm ci
      - name: Build web app
        working-directory: apps/web
        run: npm run build

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose -f docker-compose.yml build

      - name: Start infra (postgres + redis)
        run: docker compose -f docker-compose.yml up -d postgres redis

      - name: Wait for infra healthy
        run: |
          for i in $(seq 1 20); do
            if docker compose -f docker-compose.yml ps --format json | grep -q '"Health":"healthy"'; then
              echo "Infra healthy"
              break
            fi
            sleep 3
          done
          docker compose -f docker-compose.yml ps

      - name: Start API and capture logs on failure
        run: |
          docker compose -f docker-compose.yml up -d api
          sleep 5
          if ! docker compose -f docker-compose.yml ps api | grep -q "Up"; then
            echo "=== API CONTAINER LOGS ==="
            docker compose -f docker-compose.yml logs api
            echo "=== API CONTAINER INSPECT ==="
            docker inspect 42-training-api-1 2>/dev/null | grep -A5 "State"
            exit 1
          fi
          echo "API started"

      - name: Start remaining services
        run: |
          docker compose -f docker-compose.yml up -d ai_gateway web
          sleep 10

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 5
          done
          echo "API failed to become healthy"
          docker compose -f docker-compose.yml logs api
          exit 1

      - name: Wait for AI Gateway health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8100/health; then
              echo "AI Gateway is healthy"
              exit 0
            fi
            echo "Waiting for AI Gateway... ($i/30)"
            sleep 5
          done
          echo "AI Gateway failed to become healthy"
          docker compose -f docker-compose.yml logs ai_gateway
          exit 1

      - name: Verify health responses
        run: |
          set -e
          echo "=== API ==="
          curl -sf http://localhost:8000/health | python3 -m json.tool
          echo "=== AI Gateway ==="
          curl -sf http://localhost:8100/health | python3 -m json.tool

      - name: Tear down
        if: always()
        run: |
          echo "=== ALL CONTAINER LOGS ==="
          docker compose -f docker-compose.yml logs --tail=30
          docker compose -f docker-compose.yml down -v
