version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: training
      POSTGRES_PASSWORD: training
      POSTGRES_DB: training
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    environment:
      API_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://training:training@postgres:5432/training
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  ai_gateway:
    build:
      context: ../services/ai_gateway
      dockerfile: Dockerfile
    environment:
      AI_GATEWAY_PORT: 8100
      AI_GATEWAY_API_BASE_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8100:8100"

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      target: dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_AI_GATEWAY_URL: http://localhost:8100
      PORT: 3000
    depends_on:
      - api
      - ai_gateway
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  redis-data:
